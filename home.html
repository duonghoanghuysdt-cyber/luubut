<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Lưu Bút & Kỷ Niệm Nhóm 5</title>
    <style>
        :root {
            --primary-color: #ff69b4;
            --primary-hover: #ff3399;
            --accent-color: #00cec9;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --text-sub: #636e72;
            --input-bg: #f8f9fa;
            --input-border: #dfe6e9;
            --card-border: rgba(0, 0, 0, 0.06);
            --btn-toggle-bg: #f1f2f6;
        }

        body.dark-theme {
            --bg-gradient: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
            --header-bg: rgba(30, 30, 30, 0.85);
            --card-bg: #262626;
            --text-color: #f5f5f5;
            --text-sub: #b0b0b0;
            --input-bg: #1b1b1b;
            --input-border: #3a3a3a;
            --card-border: rgba(255, 255, 255, 0.1);
            --btn-toggle-bg: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 15px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--card-border);
            transition: background 0.4s ease;
            flex-wrap: wrap;
            gap: 12px;
        }

        header h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 800;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .btn-theme-toggle {
            background-color: var(--btn-toggle-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .btn-logout {
            background-color: transparent;
            border: 1.5px solid var(--primary-color);
            color: var(--primary-color);
            padding: 7px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            max-width: 1050px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .tab-container {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--card-border);
            padding-bottom: 12px;
            overflow-x: auto;
        }

        .tab-btn {
            background: var(--card-bg);
            color: var(--text-sub);
            border: 1px solid var(--input-border);
            padding: 12px 22px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .post-form {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .form-header-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .post-form h3 {
            margin: 0;
            color: var(--primary-color);
            font-size: 17px;
        }

        .post-form textarea {
            width: 100%;
            height: 110px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text-color);
            padding: 14px;
            box-sizing: border-box;
            resize: vertical;
            outline: none;
            font-size: 15px;
            margin-bottom: 14px;
            font-family: inherit;
        }

        .file-upload-wrapper {
            margin-bottom: 15px;
            display: none;
        }

        .btn-select-image {
            display: inline-block;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px dashed var(--primary-color);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .image-preview-box {
            margin-top: 10px;
            position: relative;
            display: none;
            max-width: 200px;
        }

        .image-preview-box img {
            width: 100%;
            max-height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .btn-remove-img {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .privacy-select {
            background: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            padding: 8px 12px;
            border-radius: 8px;
        }

        .btn-send {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 26px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-left: 5px solid var(--primary-color);
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--card-border);
            border-left-width: 5px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 8px;
        }

        .author {
            font-weight: bold;
            color: var(--primary-color);
            font-size: 16px;
        }

        .badge {
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .badge-private { background: #ffeaa7; color: #d63031; }
        .badge-public { background: #e8f8f5; color: #2ecc71; }
        .badge-anon { background: #e0dbff; color: #6c5ce7; }
        .badge-gift { background: #e0f7fa; color: #00838f; }
        .badge-memory { background: #ffe0e0; color: #d63031; }

        .content {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-color);
            white-space: pre-line;
            margin-bottom: 15px;
        }

        .memory-img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: block;
            object-fit: cover;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .like-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .like-btn { color: #e84393; }
        .delete-btn { color: #ff7675; font-size: 13px; }

        .empty-msg {
            color: var(--text-sub);
            font-style: italic;
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <header>
        <h1>CONAN</h1>
        <div class="user-info">
            <button class="btn-theme-toggle" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span> <span id="theme-text">Nền tối</span>
            </button>
            <span id="current-user-display">Thành viên</span>
            <button class="btn-logout" onclick="logout()">Đăng xuất</button>
        </div>
    </header>

    <div class="container">
        <!-- TAB CHUYỂN ĐỔI -->
        <div class="tab-container">
            <button class="tab-btn active" id="tab-luubut" onclick="switchTab('luubut')">📌 Lưu Bút Nhóm</button>
            <button class="tab-btn" id="tab-ky-niem" onclick="switchTab('ky-niem')">📸 Góc Kỷ Niệm (Ảnh)</button>
            <button class="tab-btn" id="tab-nhatky" onclick="switchTab('nhatky')">📖 Nhật Ký Cá Nhân</button>
            <button class="tab-btn" id="tab-gop-y" onclick="switchTab('gop-y')">🕵️ Góp Ý Ẩn Danh</button>
        </div>

        <!-- FORM VIẾT BÀI LUÔN HIỆN -->
        <div class="post-form">
            <div class="form-header-title">
                <h3 id="form-title">✍️ Đăng bài mới:</h3>
            </div>
            
            <textarea id="post-content" placeholder="Viết nội dung tại đây..."></textarea>

            <div class="file-upload-wrapper" id="upload-wrapper">
                <label for="img-file-input" class="btn-select-image">📸 Chọn ảnh từ bộ sưu tập...</label>
                <input type="file" id="img-file-input" accept="image/*" style="display: none;" onchange="handleImageSelect(event)">
                
                <div class="image-preview-box" id="preview-box">
                    <img id="preview-img" src="" alt="Xem trước">
                    <button class="btn-remove-img" onclick="removeSelectedImage()">✕</button>
                </div>
            </div>
            
            <div class="form-options">
                <div id="option-box"></div>
                <button class="btn-send" onclick="addPost()">ĐĂNG BÀI</button>
            </div>
        </div>

        <!-- DANH SÁCH BÀI VIẾT BÊN DƯỚI -->
        <h3 id="section-title" style="color: var(--text-color); margin-bottom: 15px;">📌 Danh sách bài đăng:</h3>
        <div class="cards-list" id="cards-container"></div>
    </div>

    <script>
        const ALL_MEMBERS = ["Huy", "Lan", "Anh", "Thư", "Linh"];

        function initTheme() {
            const savedTheme = localStorage.getItem("preferredTheme");
            if (savedTheme === "dark") {
                document.body.classList.add("dark-theme");
                document.getElementById("theme-icon").innerText = "☀️";
                document.getElementById("theme-text").innerText = "Nền sáng";
            }
        }

        function toggleTheme() {
            document.body.classList.toggle("dark-theme");
            const isDark = document.body.classList.contains("dark-theme");
            document.getElementById("theme-icon").innerText = isDark ? "☀️" : "🌙";
            document.getElementById("theme-text").innerText = isDark ? "Nền sáng" : "Nền tối";
            localStorage.setItem("preferredTheme", isDark ? "dark" : "light");
        }

        initTheme();

        const currentUser = localStorage.getItem("currentUser") || "Huy";
        document.getElementById('current-user-display').innerText = "👤 " + currentUser;

        let posts = JSON.parse(localStorage.getItem("groupPosts")) || [];
        let currentTab = "luubut";
        let base64Image = "";

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                base64Image = e.target.result;
                document.getElementById('preview-img').src = base64Image;
                document.getElementById('preview-box').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function removeSelectedImage() {
            base64Image = "";
            document.getElementById('img-file-input').value = "";
            document.getElementById('preview-box').style.display = 'none';
        }

        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            const optionBox = document.getElementById('option-box');
            const formTitle = document.getElementById('form-title');
            const sectionTitle = document.getElementById('section-title');
            const uploadWrapper = document.getElementById('upload-wrapper');

            removeSelectedImage();
            uploadWrapper.style.display = "none";

            if (tab === 'luubut') {
                formTitle.innerText = "✍️ Viết dòng lưu bút chung cho nhóm:";
                sectionTitle.innerText = "📌 Tất cả lưu bút công khai:";
                optionBox.innerHTML = `<span style="font-size: 13px; color: #2ecc71; font-weight: 600;">🌐 Chế độ: Công Khai cả nhóm</span>`;
            } 
            else if (tab === 'ky-niem') {
                formTitle.innerText = "📸 Chia sẻ hình ảnh kỷ niệm đẹp:";
                sectionTitle.innerText = "📸 Album kỷ niệm đáng nhớ của nhóm:";
                uploadWrapper.style.display = "block";
                optionBox.innerHTML = `<span style="font-size: 13px; color: #e84393; font-weight: 600;">📸 Ảnh sẽ đăng vào Album Kỷ Niệm</span>`;
            }
            else if (tab === 'nhatky') {
                formTitle.innerText = "📖 Viết nhật ký hoặc Gửi lời nhắn riêng:";
                sectionTitle.innerText = "📖 Nhật Ký của bạn:";
                
                const otherMembers = ALL_MEMBERS.filter(m => m !== currentUser);
                let optionsHTML = `<option value="private">🔒 Nhật ký riêng tư (Chỉ mình tôi)</option>`;
                otherMembers.forEach(m => {
                    optionsHTML += `<option value="target:${m}">🎁 Gửi riêng cho ${m}</option>`;
                });

                optionBox.innerHTML = `
                    <label style="font-size: 13px; color: var(--text-sub); font-weight: 600;">Gửi đến: </label>
                    <select id="privacy-mode" class="privacy-select">${optionsHTML}</select>
                `;
            } 
            else if (tab === 'gop-y') {
                formTitle.innerText = "🕵️ Gửi góp ý / tâm sự ẩn danh:";
                sectionTitle.innerText = "🕵️ Hòm thư góp ý ẩn danh chung:";
                optionBox.innerHTML = `<span style="font-size: 13px; color: #6c5ce7; font-weight: 600;">🕵️ Danh tính của bạn sẽ được BẢO MẬT 100%</span>`;
            }

            renderPosts();
        }

        function renderPosts() {
            const container = document.getElementById('cards-container');
            container.innerHTML = "";

            const filteredPosts = posts.filter(post => {
                if (currentTab === 'luubut') return post.type === 'public';
                if (currentTab === 'ky-niem') return post.type === 'memory';
                if (currentTab === 'nhatky') {
                    return (post.type === 'private' && post.author === currentUser) || 
                           (post.type === 'target' && post.targetUser === currentUser);
                } 
                if (currentTab === 'gop-y') return post.type === 'anonymous';
            });

            if (filteredPosts.length === 0) {
                container.innerHTML = `<div class="empty-msg">Chưa có bài đăng nào trong mục này! Đăng bài đầu tiên nhé!</div>`;
                return;
            }

            filteredPosts.forEach((post) => {
                const originalIndex = posts.findIndex(p => p.id === post.id);
                const isMyPost = (post.author === currentUser);

                let badgeHTML = "";
                let displayAuthor = post.author;

                if (post.type === 'private') {
                    badgeHTML = `<span class="badge badge-private">🔒 Khóa sổ</span>`;
                } else if (post.type === 'target') {
                    badgeHTML = `<span class="badge badge-gift">🎁 Lời nhắn từ ${post.author}</span>`;
                } else if (post.type === 'anonymous') {
                    badgeHTML = `<span class="badge badge-anon">🕵️ Ẩn danh</span>`;
                    displayAuthor = "Thành viên ẩn danh";
                } else if (post.type === 'memory') {
                    badgeHTML = `<span class="badge badge-memory">📸 Kỷ Niệm</span>`;
                } else {
                    badgeHTML = `<span class="badge badge-public">🌐 Công khai</span>`;
                }

                const imageHTML = post.imageUrl 
                    ? `<img src="${post.imageUrl}" class="memory-img" alt="Kỷ niệm">` 
                    : ``;

                const deleteButtonHTML = (isMyPost || post.targetUser === currentUser)
                    ? `<button class="delete-btn" onclick="deletePost(${originalIndex})">🗑️ Xóa</button>` 
                    : `<span></span>`;

                const cardHTML = `
                    <div class="card">
                        <div class="card-header">
                            <span class="author">${displayAuthor}</span>
                            <div>
                                ${badgeHTML}
                                <span style="margin-left: 8px;">🕒 ${post.time}</span>
                            </div>
                        </div>
                        <div class="content">${post.content}</div>
                        ${imageHTML}
                        <div class="card-footer">
                            <button class="like-btn" onclick="likePost(${originalIndex})">❤️ ${post.likes}</button>
                            ${deleteButtonHTML}
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function addPost() {
            const contentInput = document.getElementById('post-content');
            const content = contentInput.value.trim();

            if (!content && !base64Image) {
                alert("Vui lòng viết nội dung hoặc chọn ảnh!");
                return;
            }

            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')} - ${now.getDate().toString().padStart(2, '0')}/${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getFullYear()}`;

            let postType = "public";
            let targetUser = "";

            if (currentTab === 'luubut') {
                postType = "public";
            } else if (currentTab === 'ky-niem') {
                postType = "memory";
            } else if (currentTab === 'gop-y') {
                postType = "anonymous";
            } else if (currentTab === 'nhatky') {
                const privacySelect = document.getElementById('privacy-mode').value;
                if (privacySelect.startsWith("target:")) {
                    postType = "target";
                    targetUser = privacySelect.replace("target:", "");
                } else {
                    postType = "private";
                }
            }

            const newPost = {
                id: Date.now(),
                author: currentUser,
                targetUser: targetUser,
                content: content,
                imageUrl: base64Image,
                time: timeString,
                type: postType,
                likes: 0
            };

            posts.unshift(newPost);
            localStorage.setItem("groupPosts", JSON.stringify(posts));
            
            contentInput.value = "";
            removeSelectedImage();
            renderPosts();
        }

        function deletePost(index) {
            if (confirm("Bạn có chắc muốn xóa bài viết này?")) {
                posts.splice(index, 1);
                localStorage.setItem("groupPosts", JSON.stringify(posts));
                renderPosts();
            }
        }

        function likePost(index) {
            posts[index].likes += 1;
            localStorage.setItem("groupPosts", JSON.stringify(posts));
            renderPosts();
        }

        function logout() {
            localStorage.removeItem("currentUser");
            window.location.href = "index.html";
        }

        switchTab('luubut');
    </script>
</body>
</html>
