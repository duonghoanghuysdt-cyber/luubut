<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác minh danh tính - LƯU BÚT NHÓM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #121316 0%, #1c1d22 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* KHUNG ĐĂNG NHẬP LÀM MỚI (GLASSMORPHISM & GLOW EFFECT) */
        .login-card {
            background: rgba(33, 35, 40, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        0 0 25px rgba(255, 102, 178, 0.08);
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            transition: transform 0.3s ease;
        }

        .detective-icon {
            font-size: 52px;
            display: inline-block;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        .login-card h2 {
            background: linear-gradient(135deg, #ff66b2 0%, #ff85c2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .login-card p {
            color: #9aa0a6;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #c5c7ce;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 16px;
            opacity: 0.7;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            background: rgba(18, 19, 22, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 14px;
            color: #ffffff;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-group input::placeholder {
            color: #5f6368;
        }

        .form-group input:focus {
            border-color: #ff66b2;
            background: rgba(18, 19, 22, 0.9);
            box-shadow: 0 0 12px rgba(255, 102, 178, 0.2);
        }

        /* NÚT TIẾP TỤC ĐƯỢC NÂNG CẤP DẢI MÀU & HIỆU ỨNG */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff66b2 0%, #e05297 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 0.8px;
            box-shadow: 0 6px 20px rgba(255, 102, 178, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 102, 178, 0.45);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #ff5252;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }

        /* POPUP CÂU HỎI */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: #212328;
            padding: 35px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 102, 178, 0.4);
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5),
                        0 0 25px rgba(255, 102, 178, 0.2);
            position: relative;
        }

        .modal-card h3 {
            color: #ff66b2;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .modal-card p {
            color: #d4d4d4;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .modal-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
            position: relative;
            min-height: 50px;
        }

        .btn-yes {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff66b2 0%, #e05297 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
            box-shadow: 0 4px 15px rgba(255, 102, 178, 0.3);
            transition: all 0.2s ease;
        }

        .btn-yes:hover {
            transform: translateY(-1px);
        }

        .btn-no {
            padding: 12px 24px;
            background: #2d3038;
            color: #8a8f9d;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            position: relative;
            flex: 1;
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <span class="detective-icon">🕵️‍♂️</span>
        <h2>LƯU BÚT NHÓM</h2>
        <p>Xác minh danh tính 1 trong 5 thành viên</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Tên của bạn:</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" placeholder="Ví dụ: Huy, Lan, Anh, Thư, Linh" autocomplete="off" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="password" placeholder="Nhập mật khẩu của bạn..." required>
                </div>
            </div>

            <button type="submit" class="btn-login">TIẾP TỤC</button>
            <div id="errorMsg" class="error-msg">Tên hoặc mật khẩu không chính xác!</div>
        </form>
    </div>

    <!-- KHUNG XÁC MINH CÂU HỎI ĐẸP TRAI -->
    <div class="modal-overlay" id="handsomeModal">
        <div class="modal-card">
            <span style="font-size: 40px; display: block; margin-bottom: 10px;">😎</span>
            <h3>CÂU HỎI BẢO MẬT</h3>
            <p>Cho hỏi thật lòng: <b>Huy có đẹp trai không?</b></p>
            <div class="modal-btns">
                <button class="btn-yes" onclick="finishLogin()">Có, quá đẹp trai! ❤️</button>
                <button class="btn-no" id="btnNo" onmouseover="dodgeButton()" onclick="wrongAnswer()">Không ❌</button>
            </div>
        </div>
    </div>

    <script>
        const ACCOUNTS = {
            "huy": "huy123",
            "lan": "lan123",
            "thư": "thu123",
            "thu": "thu123",
            "linh": "linh123",
            "anh": "anh123"
        };

        const NAME_MAP = {
            "huy": "Huy",
            "lan": "Lan",
            "thư": "Thư",
            "thu": "Thư",
            "linh": "Linh",
            "anh": "Anh"
        };

        let pendingUser = "";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const rawUser = document.getElementById("username").value.trim();
            const inputUser = rawUser.toLowerCase();
            const inputPass = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");

            if (ACCOUNTS[inputUser] && ACCOUNTS[inputUser] === inputPass) {
                pendingUser = NAME_MAP[inputUser];
                document.getElementById("handsomeModal").classList.add("active");
            } else {
                errorMsg.innerText = "Tên thành viên hoặc mật khẩu không đúng!";
                errorMsg.style.display = "block";
            }
        });

        function dodgeButton() {
            const btnNo = document.getElementById("btnNo");
            const x = Math.random() * 160 - 80;
            const y = Math.random() * 100 - 50;
            btnNo.style.transform = `translate(${x}px, ${y}px)`;
        }

        function finishLogin() {
            localStorage.setItem("currentUser", pendingUser);
            window.location.href = "home.html";
        }
    </script>
</body>
</html>
